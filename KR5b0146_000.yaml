body:
  text: 右八條夫靈寶妙法生于元始之先真體空寂湛然常靜有善斯見無緣則隱雖真韻夷妙圎通無方智者體之有無之間愚者起疑謂之永滅故覩其卷軸不可謂有就其常靜不可謂無故無中生有有中生無了然無質故不可窮混成也無為也仁者得仁智者得智愚者因之發解神照以之生慧故知經從理生孰謂不然勤求則神慧因鑒棄捨則精神昏暗故經是大解之宗理為棲義之宅常靜崇高則凡賢絶仰太上洞玄靈寶法身製論
  hash: sha256:f66787c1c8a839bac940747b56266cdfa6ad61fd624c5f23d4da5b6d03ee4c4b
