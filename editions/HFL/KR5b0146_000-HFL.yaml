body:
  text: 右八條夫靈寳妙法生于元始之先眞體空寂湛然常靜有善斯見無縁則隱雖眞韻夷妙圎通無方智者體之有無之間愚者起疑謂之永滅故覩其卷軸不可謂有就其常靜不可謂無故無中生有有中生無了然無質故不可窮混成也無爲也仁者得仁智者得智愚者因之發解神照以之生慧故知經從理生孰謂不然勤求則神慧因鑒棄捨則精神昏闇故經是大解之宗理爲棲義之宅常靜崇高則凡賢絶仰太上洞玄靈寳法身製論
  hash: sha256:0a3aae7251086d8a2105274e6cf14a9dc8e425617de59b6a9acc1e87918249b5
