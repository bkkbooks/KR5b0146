front:
  text: 太上洞玄靈寳法身製論陶十入爲道性以忍辱爲上禮之爲用唯和爲貴入道之法宜忌忿爭若聲與色厲驚衆駭羣執愚專性輕用手舞如此則損氣傷學犯者永不得預法座若不依科奪治削籙酒性敗德爭慢所由科戒顯詳而犯者未復凡籙生皆宜節愼況復學士寜得不禁經文酒制宜應遵用其和神將藥節宜得理若起齋定座設啓狀求感不得因色到衆或潜𣊻隱愆謂衆不知犯者禁錮百日再犯奪治籙惡言綺語明賢禁戒利口覆邦先聖髙誨若有反覆白黑評論得失妄宣是非空造貝錦爲衆所患宜應防杜犯者依科禁錮一年三犯奪治籙生爲大德之主仁爲儒道之宗慈爲福端殺爲罪首立功𣗳德莫如去害故濟生之苦皆由慈心於物頃來男女學士毎以五月夏節逆唱放生未至其日先巳羅捕造於臨流悉已薨夭旣欲招福反尤大罪自今以後不宜預云放生若有善心卒遇便買义設齋福之家師主亦禁戒輕侮任辦則是事主之愆犯者禁錮二百日齋戒威儀𢊍福科令陸先生具巳詳之可設備矣旣逺近親聞德音亦宜共禀規誨若有越用法典假因觴跪蹲鐘椀如此則與遊宴無别爲傍觀者可哂宜應悉攺悛不得懼萬姓嫌疑乃全科典有聞犯者禁錮一年三犯依律治罪削名五辛之菜六畜之肉並戒所禁學士無嘗或以傷神損性或使祈奏無感若請疾救戹宜以自戒仍不忌嫌疑爲識士所譏遂今同法横爲其哂犯者禁錮百日德不孤立必須隣友黨輩徃來不可都斷且人有德不能無行行應有方脫善信之家設齋辦𢊍推敬之心三界並記何況學士寧無一感而躭著觴宴或爲競利所拘致令福主合門心懷煩惱望賓淹遲神疲體倦忿心内發此巳爲衆情嗟恨切尋冥理安得無罪自今以後先已名被必有急事逆報請主當更詮覓而逼慕奢寛遂使主見之咸有恨色此宜愼杜有犯禁錮二百日三犯永墮不得復預法座韶武之樂雅頌之音由來久矣邈然難追遘及鄭衞遺聲妖艶辭章西羌雜伎北胡鼔舞旣不能輔性娛神正足亂志若於曲集法㑹饒送同法觴旣過限遂令俗翫不招自泄此皆亂神傷形損道悖徳有犯禁錮百日
